name: npm.madfam.io auth
description: >-
  Configure repo .npmrc for npm.madfam.io and verify the token authenticates.
  Canonical public distribution for MADFAM private registry CI (madfam-org).
author: MADFAM Engineering

branding:
  icon: package
  color: blue

inputs:
  token:
    description: Bearer token for npm.madfam.io (defaults to env NPM_MADFAM_TOKEN)
    required: false
  registry-url:
    description: Registry base URL
    required: false
    default: https://npm.madfam.io
  require-publish-capable:
    description: Run npm publish --dry-run to verify publish ACL
    required: false
    default: 'false'

runs:
  using: composite
  steps:
    - name: Validate token and configure .npmrc
      shell: bash
      env:
        INPUT_TOKEN: ${{ inputs.token }}
        REGISTRY_URL: ${{ inputs.registry-url }}
        REQUIRE_PUBLISH: ${{ inputs.require-publish-capable }}
      run: |
        set -euo pipefail

        TOKEN="${INPUT_TOKEN:-${NPM_MADFAM_TOKEN:-}}"
        if [ -z "${TOKEN}" ]; then
          echo "::error::NPM_MADFAM_TOKEN is empty — set org/repo secret or pass inputs.token"
          exit 1
        fi

        printf '\n//npm.madfam.io/:_authToken=%s\n' "${TOKEN}" >> .npmrc
        chmod 600 .npmrc

        echo "--- .npmrc (token redacted) ---"
        sed 's/_authToken=.*/_authToken=<REDACTED>/' .npmrc
        echo "TOKEN_LEN=${#TOKEN}"

        HTTP_CODE=$(curl -sf -o /tmp/npm_whoami.json -w '%{http_code}' \
          -H "Authorization: Bearer ${TOKEN}" \
          "${REGISTRY_URL}/-/whoami" || echo "000")
        echo "curl /-/whoami → HTTP ${HTTP_CODE}"
        cat /tmp/npm_whoami.json | head -c 200 || true
        echo

        USERNAME=$(jq -r '.username // empty' /tmp/npm_whoami.json 2>/dev/null || true)
        if [ -z "${USERNAME}" ]; then
          echo "::error::Registry token did not return a username (body may be {}). Publish will fail."
          exit 1
        fi
        echo "registry username: ${USERNAME}"

        if ! npm whoami --registry "${REGISTRY_URL}/" 2>&1; then
          echo "::error::npm whoami failed against ${REGISTRY_URL}"
          exit 1
        fi

        if [ "${REQUIRE_PUBLISH}" = "true" ]; then
          SMOKE_DIR=$(mktemp -d)
          trap 'rm -rf "${SMOKE_DIR}"' EXIT
          printf '%s\n' \
            '{' \
            '  "name": "@madfam/npm-publish-smoke",' \
            '  "version": "0.0.0-smoke",' \
            '  "private": true,' \
            '  "description": "CI publish ACL probe (dry-run only)"' \
            '}' > "${SMOKE_DIR}/package.json"
          (cd "${SMOKE_DIR}" && npm publish --dry-run --access restricted --registry "${REGISTRY_URL}/")
          echo "publish dry-run OK"
        fi
