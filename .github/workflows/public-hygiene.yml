name: Public Hygiene

on:
  pull_request:
    paths:
      - '**/*.md'
      - '**/*.mdx'
      - '**/*.txt'
      - 'README*'
      - 'SECURITY*'
      - 'CONTRIBUTING*'
      - 'CHANGELOG*'
      - 'scripts/public-hygiene-check.sh'
      - '.github/workflows/public-hygiene.yml'
  push:
    branches: [main]
    paths:
      - '**/*.md'
      - '**/*.mdx'
      - '**/*.txt'
      - 'README*'
      - 'SECURITY*'
      - 'CONTRIBUTING*'
      - 'CHANGELOG*'
      - 'scripts/public-hygiene-check.sh'
      - '.github/workflows/public-hygiene.yml'

permissions:
  contents: read

jobs:
  public-hygiene:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check public repository hygiene
        run: ./scripts/public-hygiene-check.sh
