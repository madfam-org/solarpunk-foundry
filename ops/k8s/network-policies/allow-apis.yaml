# API Ingress Network Policies
# Allow external access to API endpoints
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-janua-api
  namespace: janua
spec:
  podSelector:
    matchLabels:
      app: janua-api
  policyTypes:
    - Ingress
  ingress:
    - ports:
        - port: 4100
          protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-switchyard-api
  namespace: enclii
spec:
  podSelector:
    matchLabels:
      app: switchyard-api
  policyTypes:
    - Ingress
  ingress:
    # Allow Prometheus scraping from monitoring namespace
    - from:
        - namespaceSelector:
            matchLabels:
              name: monitoring
      ports:
        - port: 4200
          protocol: TCP
    # Allow external access
    - ports:
        - port: 4200
          protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-switchyard-ui
  namespace: enclii
spec:
  podSelector:
    matchLabels:
      app: switchyard-ui
  policyTypes:
    - Ingress
  ingress:
    - ports:
        - port: 4201
          protocol: TCP
