# Solarpunk Foundry - MADFAM Monorepo & Shared Infrastructure
# Deploy via Enclii

# Solarpunk Foundry deployable surface.
#
# This repository is the public shared-package monorepo. It does not currently
# contain an app deployable; do not declare one here until its Dockerfile exists.
# The live deployable owned by this repo is the private Verdaccio registry.

# Verdaccio NPM Registry
apiVersion: enclii.dev/v1
kind: Service
metadata:
  name: npm-registry
  project: madfam-platform
  description: Private npm registry for MADFAM packages

spec:
  build:
    type: image
    image: verdaccio/verdaccio:5

  runtime:
    port: 4873
    replicas: 2
    resources:
      requests:
        cpu: "100m"
        memory: "256Mi"
      limits:
        cpu: "500m"
        memory: "512Mi"

    healthCheck: /-/ping

  env:
    - name: VERDACCIO_PORT
      value: "4873"

  volumes:
    - name: verdaccio-storage
      mountPath: /verdaccio/storage
      size: 50Gi
      storageClassName: hetzner-ssd
      accessMode: ReadWriteOnce
    - name: verdaccio-config
      mountPath: /verdaccio/conf
      configMap:
        name: verdaccio-config

  domains:
    - domain: npm.madfam.io
      tls: true
      tlsIssuer: cloudflare

  autoscaling:
    enabled: false
    minReplicas: 2
    maxReplicas: 2

  slo:
    availability: 99.9
    latencyP95: 200
    errorRate: 0.5
